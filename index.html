<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BioTrack</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- HEADER -->
<header>
  <span class="logo">BioTrack</span>
</header>

<!-- MAIN -->
<main>
  <aside id="sidebar">
    <div class="sidebar-header">
      <input type="checkbox" id="cb-global" checked />
      <label for="cb-global">Requins</label>
    </div>
    <ul id="shark-list"></ul>
  </aside>

  <div id="map-wrapper">
    <div id="map-placeholder">La carte Leaflet s'affichera ici</div>
    <div id="map" style="display:none;"></div>
  </div>
</main>

<!-- FOOTER -->
<footer>
  <p class="footer-copy">BioTrack &copy; 2026</p>
</footer>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>

</html>
